services:
  php:
    build: .
    tty: true
    volumes:
      - ./:/app
    working_dir: /app
    command: ["php", "-S", "0.0.0.0:8080", "-t", "public"]
    ports:
      - 8080:8080
    depends_on:
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      neo4j:
        condition: service_healthy
  mongodb:
    image: mongo
    environment:
      MONGO_INITDB_DATABASE: ecommerce
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch-wolfi:9.4.2
    environment:
      - xpack.security.enabled=false
      - discovery.type=single-node
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fs http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
  rabbitmq:
    image: rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
  neo4j:
    image: neo4j
    environment:
      NEO4J_AUTH: neo4j/12345678
    ports:
      - 7474:7474
      - 7687:7687
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
